<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paintball Żory</title>

<style>

html {
  scroll-behavior: smooth;
  background: linear-gradient(180deg,#050505 0%,#0a0a0a 40%,#111 70%,#050505 100%);
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #eee;
  min-height: 100vh;
}

/* NAV */

nav {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

nav a {
  color: #ccc;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #4CAF50;
}

/* HERO */

header {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
  url('background.png');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

header h1 {
  font-size: 60px;
  margin: 0;
}

header p {
  font-size: 20px;
  color: #ccc;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: linear-gradient(45deg, #4CAF50, #2e7d32);
  color: white;
  border-radius: 25px;
  text-decoration: none;
}

/* SEKCJE */

section {
  padding: 120px 20px;
  text-align: center;
  background: rgba(0,0,0,0.25);
}

/* 🔥 FADE FIX */

.fade {
  opacity: 0;
  transform: translateY(60px);
  transition: all 0.8s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* O NAS */

.about {
  max-width: 900px;
  margin: auto;
}

.about p {
  color: #ddd;
  line-height: 1.6;
}

/* TEAM */

.team {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 40px;
}

.team img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 12px;
}

/* STATY */

.stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.stats div {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 10px;
  color: #4CAF50;
}

/* GALERIA */

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 10px;
}

/* STOPKA */

footer {
  padding:40px;
  text-align:center;
  color:#777;
}

</style>

</head>

<body>

<nav>
<a href="#onas">O NAS</a>
<a href="#cennik">CENNIK</a>
<a href="#galeria">GALERIA</a>
<a href="#kontakt">KONTAKT</a>
</nav>

<header>
<div>
<h1>Paintball Żory</h1>
<p>Adrenalina • Emocje • Rywalizacja</p>
<a href="#kontakt" class="btn">Zarezerwuj</a>
</div>
</header>

<section id="onas" class="fade about">
<h2>O nas</h2>

<p>Jesteśmy pasjonatami paintballa sportowego...</p>

<div class="team">
<img src="team1.png">
<img src="team2.png">
</div>

<div class="stats">
<div>1000+<br>rozegranych gier</div>
<div>5000+<br>zadowolonych klientów</div>
<div>5+<br>lat doświadczenia</div>
</div>

</section>

<section id="galeria" class="fade">
<h2>Galeria</h2>

<div class="gallery">
<img src="image1.png">
<img src="image2.png">
<img src="image3.png">
</div>

</section>

<footer>
Paintball Żory © 2026
</footer>

<script>
const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
      observer.unobserve(entry.target);
    }
  });
}, {
  threshold: 0.15
});

window.addEventListener('load', () => {
  faders.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight) {
      el.classList.add('show');
    }
    observer.observe(el);
  });
});
</script>

</body>
</html>
